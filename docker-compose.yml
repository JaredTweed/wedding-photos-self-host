services:
  shared-lens:
    build: .
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /data
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
      ACCOUNT_CREATION_PASSWORD: ${ACCOUNT_CREATION_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - ./data:/data
    restart: unless-stopped

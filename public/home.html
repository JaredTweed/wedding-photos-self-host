<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Shared Lens</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="modulepreload" href="/js/home.js?v=20260330-2" />
  <style>
    :root {
      --font-size: 1.2rem;
      --image-width: 160px;
      --site-font: Georgia, "Times New Roman", serif;
      --primary-color: hsl(96 23.7% 54%);
      --secondary-color: hsl(96 21% 94%);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    html,
    body {
      height: 100%;
      margin: 0;
      top: 0;
    }

    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: var(--site-font);
      background: #ffffff;
      color: #222;
      position: relative;
      padding-top: calc(var(--safe-top) + constant(safe-area-inset-top, 0px));
      padding-right: calc(var(--safe-right) + constant(safe-area-inset-right, 0px));
      padding-bottom: calc(var(--safe-bottom) + constant(safe-area-inset-bottom, 0px));
      padding-left: calc(var(--safe-left) + constant(safe-area-inset-left, 0px));
      min-height: 100dvh;
    }

    body * {
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    #dateIndicator {
      position: fixed;
      top: 7rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 1rem;
      font-size: 1rem;
      z-index: 10001;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      text-align: center;
    }

    #container {
      display: flex;
      flex-direction: column;
      width: calc(100vw - var(--safe-left) - var(--safe-right));
      height: calc(100dvh - var(--safe-top) - var(--safe-bottom));
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
      overscroll-behavior: contain;
    }

    header {
      flex: 0;
      font-size: var(--font-size);
      width: calc(100% - 16px - var(--safe-left) - var(--safe-right));
      padding: calc(10px + var(--safe-top)) 8px 7px 8px;
      position: sticky;
      top: var(--safe-top);
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 1000;
      border-radius: 0 0 8px 8px;
      background-color: #fff;
    }

    #headerControls {
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }

    #addBtn {
      flex: 1;
      box-shadow: 0 0 1px rgba(0, 0, 0, 0.15), 0 6px 12px rgba(0, 0, 0, 0.15);
      display: block;
      background-color: var(--primary-color);
      color: white;
      margin: 0;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      text-align: center;
    }

    #addBtn:active,
    #settingsBtn:active {
      transform: translateY(2px);
    }

    #settingsBtn {
      box-shadow: 0 0 1px rgba(0, 0, 0, .15), 0 6px 12px rgba(0, 0, 0, .15);
      background: #fff;
      color: #333;
      margin: 0;
      height: 100%;
      border-radius: 8px;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .spinning {
      animation: spin 1.3s linear infinite;
    }

    #tabs.tabs {
      margin: 0;
      position: relative;
      display: flex;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 1px rgba(0, 0, 0, 0.15), 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    #tabs.tabs>* {
      border-radius: 8px;
    }

    #tabs.tabs .tab-header {
      position: relative;
      z-index: 2;
      flex: 1;
      text-align: center;
      padding: 0.6rem 0rem;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: color .15s ease-in;
    }

    #tabs.tabs .tab-header.active {
      color: var(--primary-color);
      font-weight: 600;
    }

    #tabs.tabs .glider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: calc(50% - 5px);
      background: var(--secondary-color);
      margin: 5px;
      z-index: 1;
      transition: transform .5s ease-out;
    }

    #tabAll.active~.glider {
      transform: translateX(100%);
    }

    #tabMine.active~.glider {
      transform: translateX(0%);
    }

    #panelContainer {
      position: relative;
      overflow-y: auto;
      width: 100%;
      height: calc(100% - 105px - var(--safe-bottom));
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      position: absolute;
      top: 0;
      left: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--image-width), 1fr));
      gap: 0.75rem;
      padding: 5px 8px 100px 8px;
      width: calc(100% - 16px);
      height: calc(100% - 105px - var(--safe-bottom));
      align-content: start;
      overflow-y: auto;
    }

    .empty-message {
      text-align: center;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100%;
      font-size: 1.2rem;
      position: absolute;
      color: black;
    }

    figure {
      margin: 0;
      position: relative;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      content-visibility: auto;
      contain-intrinsic-size: 160px 160px;
    }

    img,
    video {
      display: block;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      dynamic-range-limit: constrained;
    }

    figure.selected img,
    figure.selected video {
      width: calc(100% - 8px);
      border: 4px solid black;
    }

    .select-box {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.6);
      border-radius: 4px;
      box-sizing: border-box;
      z-index: 3;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
    }

    figure.selected .select-box {
      background: #fff;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
    }

    .video-icon {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 28px;
      height: 28px;
      pointer-events: none;
      z-index: 2;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    }

    .video-icon::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-35%, -50%);
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 11px solid #111;
    }

    #selectionToolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 0.5rem;
      padding-bottom: calc(0.5rem + var(--safe-bottom));
      background: #fff;
      box-shadow: 0 -2px 6px rgba(0, 0, 0, 0.15);
      display: none;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      z-index: 20000;
      box-sizing: border-box;
      gap: 0.5rem;
    }

    #selectionToolbar button {
      padding: 0.6rem 0.5rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    #deleteSelected {
      flex: 1;
      background: #f44336;
      color: #fff;
    }

    #deselectAll {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: -0.5rem;
      width: 3.2rem;
      height: 2rem;
      padding-right: 3px;
    }

    button,
    label,
    .tab-header,
    #deleteSelected,
    #addBtn {
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .8);
      z-index: 10000;
    }

    #overlay.visible {
      display: flex;
    }

    #overlayContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #overlayContent img,
    #overlayContent video {
      max-width: 90vw;
      max-height: min(87vh, calc(100% - 3rem));
      position: absolute;
      top: 49.5%;
      transform: translateY(-50%);
      aspect-ratio: auto;
      width: fit-content;
      height: fit-content;
      border-radius: 8px;
      cursor: default;
      background-color: rgba(0, 0, 0, 0);
      pointer-events: auto;
    }

    #timestamp {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      z-index: 10001;
      text-shadow: 1px 1px 5px black;
      pointer-events: none;
    }

    #overlayBottom {
      display: flex;
      flex-direction: column;
      position: absolute;
      bottom: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      z-index: 12010;
      gap: 3px;
      pointer-events: none;
    }

    #overlayBtn {
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      padding: .6rem 1.2rem;
      background: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      pointer-events: all;
      cursor: pointer;
      font-weight: 600;
      color: black;
      width: fit-content;
    }

    .credit {
      position: relative;
      left: 50%;
      margin: 0;
      padding: 0 0.85rem;
      transform: translateX(-50%);
      color: #fff;
      font-size: 1rem;
      text-shadow: 1px 1px 5px #000;
      text-align: center;
      pointer-events: none;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.8);
      z-index: 100000;
      touch-action: none;
      overscroll-behavior: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ccc;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #progress-row-template {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
    }

    .progress-row {
      display: flex;
      gap: .5rem;
      align-items: center;
      width: 90%;
      max-width: 30rem;
      margin: .3rem auto 0;
      color: #fff;
      font: 500 1rem system-ui;
      pointer-events: none;
    }

    .label {
      display: none;
    }

    .progress-row progress {
      flex: 1;
      height: 1.75rem;
      appearance: none;
      border: none;
      border-radius: 8px;
    }

    .progress-row progress::-webkit-progress-bar {
      background: #444;
      border-radius: 8px;
    }

    .progress-row progress::-webkit-progress-value {
      background: var(--primary-color);
      border-radius: 8px;
    }

    body.drag-over #container {
      outline: 3px dashed var(--primary-color);
      outline-offset: 8px;
    }
  </style>
</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
  </div>
  <div id="dateIndicator"></div>

  <div id="container">
    <header>
      <div id="headerControls">
        <label id="addBtn" for="filePicker">Add Photos / Videos</label>
        <button id="settingsBtn" title="Photo-credit settings">
          <img id="settingsIcon" src="/icons/settings.svg" alt="" style="width:2rem;height:2rem;box-shadow:none;vertical-align:middle;" />
        </button>
      </div>
      <input id="filePicker" type="file" multiple accept="image/*,video/*,.mov,.MOV" style="width:0;height:0;opacity:0;overflow:hidden;display:none;" />

      <div id="tabs" class="tabs">
        <div id="tabMine" class="tab-header active">My&nbsp;Uploads</div>
        <div id="tabAll" class="tab-header">All&nbsp;Uploads</div>
        <span class="glider"></span>
      </div>
    </header>

    <div id="panelContainer">
      <section id="panelMine" class="tab-panel active"></section>
      <section id="panelAll" class="tab-panel"></section>
    </div>
  </div>

  <div id="selectionToolbar">
    <button id="deleteSelected">Delete</button>
    <span id="deselectAll">&times;</span>
  </div>

  <div id="overlay">
    <div id="timestamp"></div>
    <div id="overlayContent"></div>
    <template id="progress-row-template">
      <div class="progress-row">
        <span class="label"></span>
        <progress max="100" value="0"></progress>
      </div>
    </template>

    <div id="overlayBottom" style="display:none">
      <button id="overlayBtn">Delete</button>
      <div class="credit"></div>
    </div>
  </div>

  <script type="module" src="/js/home.js?v=20260330-2"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Lens</title>
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <style>
    :root {
      --ink: #111;
      --paper: #f6f6f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100svh - 32px);
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 18px;
      box-shadow: 0 10px 0 #000;
      padding: 2rem clamp(1.25rem, 3vw, 2.5rem);
      text-align: center;
      margin: 8px 8px 16px;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: .75rem;
      margin-bottom: 1rem;
    }

    .logo-mark {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .wordmark {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      letter-spacing: 0.18em;
      font-size: clamp(1.6rem, 5.2vw, 2.2rem);
      text-transform: uppercase;
    }

    .subtitle {
      margin: .25rem 0 0 0;
      font-size: .95rem;
      color: #444;
      font-style: italic;
    }

    p {
      margin: .75rem auto;
      max-width: 46ch;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-underline-offset: 3px;
    }

    .rule {
      border: none;
      height: 1px;
      background: #000;
      margin: 1rem auto 1.25rem;
      width: min(520px, 80%);
      opacity: 0.15;
    }

    .button-group {
      display: grid;
      gap: .75rem;
      margin: 1rem auto 1.25rem;
      justify-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .85rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 999px;
      border: 2px solid #000;
      cursor: pointer;
      text-decoration: none;
      transition: transform .12s ease, box-shadow .12s ease, background-color .12s ease, color .12s ease;
      will-change: transform;
    }

    .btn-fill {
      background: #000;
      color: #fff;
      box-shadow: 0 6px 0 #000;
    }

    .btn-fill:hover,
    .btn-outline:hover {
      transform: translateY(-2px);
    }

    .btn-fill:active,
    .btn-outline:active {
      transform: translateY(0);
    }

    .btn-outline {
      background: #fff;
      color: #000;
      box-shadow: 0 6px 0 #000;
    }

    .btn-outline:hover {
      background: #111;
      color: #fff;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">
      <img class="logo-mark" src="/assets/shared-lens-logo.png" alt="Shared Lens logo" />
      <h1 class="wordmark">Shared Lens</h1>
      <p class="subtitle">Different perspectives, one story.</p>
    </div>

    <hr class="rule" />

    <p>
      by <a href="https://github.com/JaredTweed" target="_blank" rel="noopener noreferrer">Jared Tweed</a>
    </p>

    <p>
      Shared Lens allows wedding guests to share and manage photos, and enjoy others’ contributions, all without logging in.
    </p>

    <div class="button-group">
      <button class="btn btn-fill" onclick="viewDemo()">View Demo</button>
      <button class="btn btn-outline" id="createSiteButton" onclick="signInWithPassword()">Enter Password to Create Your Own</button>
    </div>
  </main>

  <script type="module" src="/js/index.js"></script>
</body>

</html>

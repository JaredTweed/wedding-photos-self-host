<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Lens</title>
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="preload" as="image" href="/assets/shared-lens-logo.png" />
  <link rel="modulepreload" href="/js/index.js" />
  <style>
    :root {
      --ink: #111;
      --paper: #f6f6f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100svh - 32px);
      margin: 0;
      padding: 8px;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 18px;
      box-shadow: 0 10px 0 #000;
      padding: 2rem clamp(1.25rem, 3vw, 2.5rem);
      text-align: center;
      margin: 0;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: .75rem;
      margin-bottom: 1rem;
    }

    .logo-mark {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .wordmark {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      letter-spacing: 0.18em;
      font-size: clamp(1.6rem, 5.2vw, 2.2rem);
      text-transform: uppercase;
    }

    .subtitle {
      margin: .25rem 0 0 0;
      font-size: .95rem;
      color: #444;
      font-style: italic;
    }

    p {
      margin: .75rem auto;
      max-width: 46ch;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-underline-offset: 3px;
    }

    .rule {
      border: none;
      height: 1px;
      background: #000;
      margin: 1rem auto 1.25rem;
      width: min(520px, 80%);
      opacity: 0.15;
    }

    .button-group {
      display: grid;
      gap: .75rem;
      margin: 1rem auto 1.25rem;
      justify-items: center;
      width: min(360px, 100%);
    }

    .auth-form {
      width: 100%;
      display: grid;
      gap: .75rem;
      text-align: left;
    }

    .auth-form label {
      display: inline-block;
      margin-bottom: .3rem;
      font-weight: 600;
    }

    .auth-form input {
      width: 100%;
      padding: .85rem 1rem;
      border-radius: 12px;
      border: 2px solid #000;
      background: #fff;
      font-size: 1rem;
      box-shadow: 0 4px 0 #000;
      outline: none;
      transition: transform .12s ease;
    }

    .auth-form input:focus {
      transform: translateY(-1px);
    }

    .auth-actions {
      display: grid;
      gap: .75rem;
    }

    .account-panel {
      display: none;
      width: 100%;
      gap: .75rem;
      justify-items: center;
    }

    .account-panel.show {
      display: grid;
    }

    .account-status {
      margin: 0;
      font-weight: 600;
    }

    .helper-text {
      margin-top: .35rem;
      font-size: .85rem;
      color: #555;
      min-height: 1.2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .85rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 999px;
      border: 2px solid #000;
      cursor: pointer;
      text-decoration: none;
      transition: transform .12s ease, box-shadow .12s ease, background-color .12s ease, color .12s ease;
      will-change: transform;
    }

    .btn-fill {
      background: #000;
      color: #fff;
      box-shadow: 0 6px 0 #000;
    }

    .btn-fill:hover,
    .btn-outline:hover {
      transform: translateY(-2px);
    }

    .btn-fill:active,
    .btn-outline:active {
      transform: translateY(0);
    }

    .btn-outline {
      background: #fff;
      color: #000;
      box-shadow: 0 6px 0 #000;
    }

    .btn-outline:hover {
      background: #111;
      color: #fff;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">
      <img class="logo-mark" src="/assets/shared-lens-logo.png" alt="Shared Lens logo" />
      <h1 class="wordmark">Shared Lens</h1>
      <p class="subtitle">Different perspectives, one story.</p>
    </div>

    <hr class="rule" />

    <p>
      by <a href="https://github.com/JaredTweed" target="_blank" rel="noopener noreferrer">Jared Tweed</a>
    </p>

    <p>
      Shared Lens allows site owners to manage their own galleries with an account, while guests can still share photos and videos without logging in.
    </p>

    <div class="button-group">
      <form class="auth-form" id="authForm">
        <div>
          <label for="usernameInput">Username</label>
          <input id="usernameInput" type="text" autocomplete="username" placeholder="yourname" />
        </div>
        <div>
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="At least 8 characters" />
        </div>
        <div class="auth-actions" id="signedOutActions">
          <button class="btn btn-fill" id="signInButton" type="submit">Sign In</button>
          <button class="btn btn-outline" id="createAccountButton" type="button">Create Account</button>
        </div>
      </form>

      <div class="account-panel" id="accountPanel">
        <p class="account-status" id="accountStatus">Signed in</p>
        <button class="btn btn-fill" id="openEditorButton" type="button">Open Site Editor</button>
        <button class="btn btn-outline" id="signOutButton" type="button">Sign Out</button>
      </div>

      <p class="helper-text" id="authMessage" aria-live="polite"></p>
    </div>
  </main>

  <script type="module" src="/js/index.js"></script>
</body>

</html>

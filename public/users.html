<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Lens Storage</title>
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <style>
    :root {
      --ink: #111;
      --paper: #f6f6f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: calc(100svh - 16px);
      margin: 0;
      padding: 8px;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 880px;
      margin: 0 auto;
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 18px;
      box-shadow: 0 10px 0 #000;
      padding: 2rem clamp(1.25rem, 3vw, 2.5rem);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .title-block h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.6rem, 4vw, 2rem);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .title-block p {
      margin: .35rem 0 0;
      color: #555;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .85rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 999px;
      border: 2px solid #000;
      cursor: pointer;
      text-decoration: none;
      transition: transform .12s ease, box-shadow .12s ease, background-color .12s ease, color .12s ease;
    }

    .btn-fill {
      background: #000;
      color: #fff;
      box-shadow: 0 6px 0 #000;
    }

    .btn-outline {
      background: #fff;
      color: #111;
      box-shadow: 0 6px 0 #000;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      box-shadow: 0 2px 0 #000;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: .9rem;
      margin: 1.5rem 0;
    }

    .summary-card {
      border: 1.5px solid #000;
      border-radius: 16px;
      box-shadow: 0 6px 0 #000;
      padding: 1rem 1rem .9rem;
    }

    .summary-card .label {
      display: block;
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #555;
      margin-bottom: .45rem;
    }

    .summary-card .value {
      display: block;
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 700;
    }

    .note {
      margin: 0 0 1rem;
      color: #555;
      font-size: .92rem;
    }

    .list-card {
      border: 1.5px solid #000;
      border-radius: 16px;
      box-shadow: 0 6px 0 #000;
      overflow: hidden;
    }

    .list-head,
    .user-row {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) 90px 90px 120px;
      gap: .75rem;
      align-items: center;
      padding: .95rem 1rem;
    }

    .list-head {
      background: #111;
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .user-row + .user-row {
      border-top: 1px solid #d4d4d4;
    }

    .user-name {
      font-weight: 700;
      word-break: break-word;
    }

    .muted {
      color: #555;
    }

    .empty {
      padding: 1.2rem 1rem;
      color: #555;
      text-align: center;
    }

    @media (max-width: 640px) {
      .card {
        padding: 1.5rem;
      }

      .list-head {
        display: none;
      }

      .user-row {
        grid-template-columns: 1fr;
        gap: .35rem;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="topbar">
      <div class="title-block">
        <h1>Storage Usage</h1>
        <p id="sessionLabel">Loading account details…</p>
      </div>

      <div class="actions">
        <button class="btn btn-outline" id="mainButton" type="button">Main Page</button>
        <button class="btn btn-outline" id="editorButton" type="button">Site Editor</button>
        <button class="btn btn-fill" id="signOutButton" type="button">Sign Out</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <span class="label">Total Used</span>
        <span class="value" id="totalUsed">0 B</span>
      </div>
      <div class="summary-card">
        <span class="label">Total Capacity</span>
        <span class="value" id="totalCapacity">0 B</span>
      </div>
      <div class="summary-card">
        <span class="label">Remaining Available</span>
        <span class="value" id="remainingAvailable">0 B</span>
      </div>
    </div>

    <p class="note" id="unassignedNote" style="display:none;"></p>

    <section class="list-card" aria-labelledby="userUsageHeading">
      <div class="list-head">
        <div id="userUsageHeading">User</div>
        <div>Sites</div>
        <div>Uploads</div>
        <div>Used</div>
      </div>
      <div id="userRows"></div>
    </section>
  </main>

  <script type="module" src="/js/users.js"></script>
</body>

</html>
